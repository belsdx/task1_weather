name: Compose Multiplatform CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux-android-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Run Multiplatform Tests
        run: ./gradlew check --continue

      - name: Build Android App
        run: ./gradlew assembleDebug

      - name: Build Linux Desktop App
        run: ./gradlew packageDistributionForCurrentOS || ./gradlew desktopJar || echo "No desktop task"

      - name: Build Web App
        run: ./gradlew wasmJsBrowserDistribution || ./gradlew jsBrowserDistribution || echo "No web task"

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: '**/build/outputs/apk/debug/*.apk'

      - name: Upload Linux Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop-jar
          path: '**/build/compose/jars/*.jar'

      - name: Upload Web Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-distribution
          path: '**/build/dist/**'

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer


      - name: Install CocoaPods Dependencies
        run: |
          sudo gem install cocoapods
          cd iosApp
          pod install || echo "No Podfile found"

      - name: Start iOS Simulator
        run: |
          xcrun simctl list devices available

          SIMULATOR_ID=$(xcrun simctl create "GitHub Actions iPhone 15" "com.apple.CoreSimulator.SimDeviceType.iPhone-15" "com.apple.CoreSimulator.SimRuntime.iOS-17-2")
          xcrun simctl boot "${SIMULATOR_ID}" || echo "Simulator already running"

          xcrun simctl bootstatus "${SIMULATOR_ID}" -b

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Run iOS Unit Tests on Simulator
        run: |
          ./gradlew :shared:iosX64Test || \
          ./gradlew :shared:iosSimulatorArm64Test || \
          echo " iOS test task not found, skipping"

      - name: Compile iOS Framework (Debug)
        run: |
          ./gradlew linkDebugFrameworkIosX64 || \
          ./gradlew linkDebugFrameworkIosSimulatorArm64 || \
          ./gradlew iosX64MainBinaries || \
          echo " iOS framework task not found"

      - name: Upload iOS Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-reports
          path: |
            **/build/reports/tests/iosX64Test/**
            **/build/test-results/iosX64Test/**
          retention-days: 7

      - name: Upload iOS Framework Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: '**/build/bin/ios*/**/*.framework'
          retention-days: 7